<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h3 class="text-center">Crear Cuenta</h3>
        </div>
        <div class="card-body">
          <form (ngSubmit)="onRegistrar()">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" name="email" [(ngModel)]="nuevoEmail" class="form-control" placeholder="tu@email.com" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" name="pass" [(ngModel)]="nuevoPass" class="form-control" placeholder="Mínimo 6 caracteres" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Registrarme</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
