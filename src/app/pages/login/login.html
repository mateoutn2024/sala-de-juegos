<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2 class="mb-4">Iniciar Sesión</h2>

      <div *ngIf="mensajeError" class="alert alert-danger">
        {{ mensajeError }}
      </div>

      <form [formGroup]="formLogin" (ngSubmit)="ingresar()">
        
        <div class="mb-3">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" class="form-control" formControlName="correo" placeholder="ejemplo@utn.edu.ar">
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" formControlName="clave" placeholder="Mínimo 6 caracteres">
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3" [disabled]="formLogin.invalid">
          Ingresar
        </button>
      </form>

      <hr>

      <h5 class="text-center mb-3">Acceso Rápido para Pruebas</h5>
      <div class="d-flex justify-content-between">
        <button class="btn btn-secondary" (click)="accesoRapido('admin@sala.com', '123456')">Admin</button>
        <button class="btn btn-secondary" (click)="accesoRapido('jugador1@sala.com', '123456')">Jugador 1</button>
        <button class="btn btn-secondary" (click)="accesoRapido('invitado@sala.com', '123456')">Invitado</button>
      </div>

    </div>
  </div>
</div>
