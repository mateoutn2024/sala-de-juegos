<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white text-center py-3">
          <h3 class="mb-0 fw-bold">Iniciar Sesión</h3>
        </div>

        <div class="card-body p-4">
          <form [formGroup]="formLogin" (ngSubmit)="ingresar()">
            
            <div class="mb-3">
              <label class="form-label fw-semibold">Correo Electrónico</label>
              <input type="email" class="form-control" formControlName="correo" placeholder="admin@sala.com">
              <span *ngIf="formLogin.get('correo')?.touched && formLogin.get('correo')?.invalid" class="error-message text-danger d-block mt-1">
                Ingresá un correo electrónico válido.
              </span>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Contraseña</label>
              <input type="password" class="form-control" formControlName="clave" placeholder="Tu contraseña">
              <span *ngIf="formLogin.get('clave')?.touched && formLogin.get('clave')?.invalid" class="error-message text-danger d-block mt-1">
                La contraseña debe tener al menos 6 caracteres.
              </span>
            </div>

            <div *ngIf="mensajeError" class="text-danger text-center fw-semibold mb-3">
              {{ mensajeError }}
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" [disabled]="formLogin.invalid">
              Ingresar
            </button>

          </form>
        </div>
      </div>

      <hr>

      <h5 class="text-center mb-3">Acceso Rápido para Pruebas</h5>

      <div class="text-center mb-3">
        <span *ngIf="usuarioLogueado" class="badge bg-success p-2 fs-6">
          Último ingreso rápido: <strong>{{ usuarioLogueado.email }}</strong>
        </span>
        <span *ngIf="!usuarioLogueado" class="badge bg-secondary p-2 fs-6">
          Ningún usuario logueado en esta vista
        </span>
      </div>
      <div class="d-flex justify-content-between">
        <button type="button" class="btn btn-secondary" (click)="accesoRapido('admin@sala.com', '123456')">Admin</button>
        <button type="button" class="btn btn-secondary" (click)="accesoRapido('jugador1@sala.com', '123456')">Jugador 1</button>
        <button type="button" class="btn btn-secondary" (click)="accesoRapido('invitado@sala.com', '123456')">Invitado</button>
      </div>

    </div>
  </div>
</div>
