<div class="container mt-5 pb-5">
  <div class="row justify-content-center text-center">
    <div class="col-12 col-md-10 col-lg-8">
      
      <h1 class="display-5 fw-bold text-dark mb-2">🏓 PONG Arcade</h1>
      <p class="text-muted mb-4">
        Controles: Usá las flechas <strong>Arriba ⬆️ / Abajo ⬇️</strong> o las teclas <strong>W / S</strong>. <br>
        Partida regulada a velocidad lenta. El primero en llegar a 5 puntos gana.
      </p>
      
      <div class="canvas-container position-relative mx-auto shadow-lg">
        <canvas #gameCanvas width="600" height="400"></canvas>
        
        <div *ngIf="!juegoActivo" class="overlay d-flex flex-column align-items-center justify-content-center">
          
          <div *ngIf="juegoTerminado" class="mb-3 text-white">
            <h2 class="fw-bold display-4 mb-1">{{ mensaje }}</h2>
            <p class="fs-5 text-warning">Tu efectividad de puntos: {{ promedioEfectividad }}%</p>
            <p class="small opacity-75">✓ Rendimiento enviado a la base de datos globales.</p>
          </div>
          
          <button (click)="iniciarJuego()" class="btn btn-primary btn-lg fw-bold rounded-pill px-5 shadow">
            {{ juegoTerminado ? 'JUGAR DE NUEVO' : 'INICIAR PARTIDA' }}
          </button>
          
        </div>
      </div>

    </div>
  </div>
</div>
