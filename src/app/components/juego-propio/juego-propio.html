<div class="container mt-5 pb-5">
  <div class="row justify-content-center text-center">
    <div class="col-md-6">
      
      <div class="juego-box p-4 shadow bg-white rounded-4">
        <h2 class="fw-bold mb-3 text-dark">🪨 Piedra, Papel o Tijera ✂️</h2>

        <div class="row g-2 mb-3 bg-dark text-white p-2 rounded-3 small">
          <div class="col-4">
            <span class="d-block opacity-75">Jugadas</span>
            <strong class="fs-5">{{ partidasTotales }}</strong>
          </div>
          <div class="col-4">
            <span class="d-block opacity-75">Ganadas</span>
            <strong class="fs-5 text-success">{{ partidasGanadas }}</strong>
          </div>
          <div class="col-4">
            <span class="d-block opacity-75">Promedio</span>
            <strong class="fs-5 text-warning">{{ promedioEfectividad }}%</strong>
          </div>
        </div>
        
        <div class="d-flex justify-content-around align-items-center my-3 p-3 bg-light rounded-3">
          <div>
            <span class="fs-6 d-block text-muted">Vos</span>
            <span class="display-3">{{ eleccionJugador ? emojis[eleccionJugador] : '❓' }}</span>
          </div>
          <span class="fw-bold fs-4 text-secondary">VS</span>
          <div>
            <span class="fs-6 d-block text-muted">CPU</span>
            <span class="display-3">{{ eleccionCPU ? emojis[eleccionCPU] : '❓' }}</span>
          </div>
        </div>

        <div class="alert fw-bold fs-6 my-3" [ngClass]="alertClass">
          {{ resultadoTexto }}
        </div>

        <div class="d-flex justify-content-center gap-3 mb-4">
          <button *ngFor="let opcion of opciones" 
                  (click)="jugar(opcion)" 
                  class="btn btn-outline-dark btn-jugar p-2 rounded-circle">
            <span class="display-4 d-block">{{ emojis[opcion] }}</span>
            <span class="small fw-bold d-block">{{ opcion }}</span>
          </button>
        </div>

        <button (click)="guardarPartida()" 
                [disabled]="partidasTotales === 0 || progresoGuardado"
                class="btn btn-success w-100 fw-bold rounded-pill p-3 shadow-sm">
          💾 GUARDAR PROMEDIO EN BASE DE DATOS
        </button>

      </div>

    </div>
  </div>
</div>
